    headers: {
      'apikey': KEY,
      'Authorization': 'Bearer ' + KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal,resolution=ignore-duplicates',
    },
    body: JSON.stringify(batch),
  });
  if (!res.ok) throw new Error(await res.text());
}

async function startSeed() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const fill = document.getElementById('fill');
  const result = document.getElementById('result');
  btn.disabled = true;
  result.innerHTML = '';

  try {
    const batchSize = 50;
    const total = LEADS.length;
    const totalBatches = Math.ceil(total / batchSize);
    for (let i = 0; i < total; i += batchSize) {
      const batchNum = Math.floor(i / batchSize) + 1;
      status.textContent = `Batch ${batchNum} of ${totalBatches} (${Math.min(i+batchSize,total)} of ${total})`;
      fill.style.width = Math.round((batchNum / totalBatches) * 100) + '%';
      await sbInsert(LEADS.slice(i, i + batchSize));
    }
    fill.style.width = '100%';
    status.textContent = 'Part 2 complete!';
    result.innerHTML = '<div class="success">✅ Leads 1001–2000 imported!<br><a href="SDBC_Seeder_3.html" class="btn next-btn">▶ Continue to Part 3 of 6</a></div>';
  } catch(e) {
    status.textContent = 'Error occurred.';
    result.innerHTML = '<div class="error">⚠️ ' + e.message + '<br><br><button class="btn" onclick="location.reload()">↺ Retry</button></div>';
    btn.disabled = false;
  }
}
</script>
